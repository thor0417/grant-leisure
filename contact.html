<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Contact Grant Leisure — every great project begins with a conversation. Get in touch with our global team." />
  <title>Contact — Grant Leisure</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800&display=swap"
    rel="stylesheet"
  />

  <!--
    DEPLOYMENT: Remove the <style> block and uncomment these three links:
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
  -->

  <style>
    /* PREVIEW ONLY — replace with external stylesheet links before deployment */


    /* ================================================================
       BASE.CSS — TOKENS · FONT-FACE · RESET · UTILITY ATOMS · REVEAL
    ================================================================ */

    @font-face {
      font-family: 'Barlow Condensed';
      font-style: normal;
      font-weight: 300;
      font-display: swap;
      src: url('assets/fonts/barlow-condensed-300.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Barlow Condensed';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url('assets/fonts/barlow-condensed-400.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Barlow Condensed';
      font-style: normal;
      font-weight: 600;
      font-display: swap;
      src: url('assets/fonts/barlow-condensed-600.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Barlow Condensed';
      font-style: normal;
      font-weight: 700;
      font-display: swap;
      src: url('assets/fonts/barlow-condensed-700.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Barlow Condensed';
      font-style: normal;
      font-weight: 800;
      font-display: swap;
      src: url('assets/fonts/barlow-condensed-800.woff2') format('woff2');
    }

    :root {
      /* ── Palette ──────────────────────────────────────────────── */
      --color-green:         #5BAF7A;
      --color-green-dark:    #3D8F5F;
      --color-navy:          #3B4F8A;
      --color-slate:         #7A7F9A;
      --color-white:         #FFFFFF;
      --color-near-black:    #111212;
      --color-off-white:     #F7F7F5;
      --color-body-text:     #2E2F2F;

      /* ── Type scale ───────────────────────────────────────────── */
      --type-display:        clamp(3rem, 7.5vw, 6.5rem);
      --type-heading:        clamp(2.2rem, 5vw, 4rem);
      --type-subheading:     clamp(1.4rem, 2.5vw, 2rem);
      --type-credentials:    clamp(1rem, 2.4vw, 1.75rem);
      --type-label:          0.75rem;
      --type-body:           clamp(1rem, 1.2vw, 1.1rem);
      --type-caption:        0.8rem;

      /* ── Spacing ──────────────────────────────────────────────── */
      --space-xs:            0.5rem;
      --space-sm:            1rem;
      --space-md:            2rem;
      --space-lg:            4rem;
      --space-xl:            7rem;
      --space-2xl:           12rem;

      /* ── Layout ───────────────────────────────────────────────── */
      --grid-max:            1440px;
      --grid-gutter:         clamp(1.5rem, 5vw, 5rem);

      /* ── Motion ───────────────────────────────────────────────── */
      --ease-out-expo:       cubic-bezier(0.16, 1, 0.3, 1);
      --ease-in-out:         cubic-bezier(0.4, 0, 0.2, 1);
      --dur-fast:            350ms;
      --dur-med:             650ms;
      --dur-slow:            1000ms;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: var(--type-body);
      font-weight: 400;
      line-height: 1.6;
      color: var(--color-body-text);
      background-color: var(--color-off-white);
      overflow-x: hidden;
    }

    img {
      display: block;
      max-width: 100%;
      height: auto;
    }

    ul, ol { list-style: none; }

    a {
      text-decoration: none;
      color: inherit;
    }

    button {
      background: none;
      border: none;
      cursor: pointer;
      font: inherit;
    }

    /* ── Typography atoms ─────────────────────────────────────── */

    .kicker {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--color-slate);
      margin-bottom: var(--space-sm);
    }

    .kicker--green { color: var(--color-green); }
    .kicker--white {
      color: rgba(255, 255, 255, 0.95);
      text-shadow: 0 1px 8px rgba(0, 0, 0, 0.6);
    }

    /* ── Scroll-reveal system ─────────────────────────────────── */

    .reveal {
      opacity: 0;
      transform: translateY(24px);
      transition:
        opacity   var(--dur-slow) var(--ease-out-expo),
        transform var(--dur-slow) var(--ease-out-expo);
    }

    .reveal.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .reveal-group > * {
      opacity: 0;
      transform: translateY(18px);
      transition:
        opacity   var(--dur-med) var(--ease-out-expo),
        transform var(--dur-med) var(--ease-out-expo);
    }

    .reveal-group.is-visible > *:nth-child(1)  { transition-delay: 0ms;   opacity: 1; transform: none; }
    .reveal-group.is-visible > *:nth-child(2)  { transition-delay: 80ms;  opacity: 1; transform: none; }
    .reveal-group.is-visible > *:nth-child(3)  { transition-delay: 160ms; opacity: 1; transform: none; }
    .reveal-group.is-visible > *:nth-child(4)  { transition-delay: 240ms; opacity: 1; transform: none; }
    .reveal-group.is-visible > *:nth-child(5)  { transition-delay: 320ms; opacity: 1; transform: none; }


    /* ================================================================
       LAYOUT.CSS — CONTAINER · NAV · HERO · FOOTER
    ================================================================ */

    .container {
      width: 100%;
      max-width: var(--grid-max);
      margin-inline: auto;
      padding-inline: var(--grid-gutter);
    }

    /* ── Navigation ───────────────────────────────────────────── */

    .site-nav {
      position: fixed;
      inset-block-start: 0;
      inset-inline: 0;
      z-index: 200;
      padding-block: var(--space-sm);
      background: transparent;
      transition:
        background-color var(--dur-fast) var(--ease-in-out),
        border-color     var(--dur-fast) var(--ease-in-out);
    }

    .site-nav.is-scrolled {
      background-color: rgba(17, 18, 18, 0.95);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    /* Scrolled: links flip to white */
    .site-nav.is-scrolled .site-nav__links a {
      color: rgba(255, 255, 255, 0.9);
      text-shadow: 0 1px 8px rgba(0, 0, 0, 0.7);
    }

    .site-nav.is-scrolled .site-nav__links a:hover {
      color: var(--color-white);
    }

    .site-nav.is-scrolled .site-nav__links a[aria-current="page"] {
      color: var(--color-green);
    }

    .site-nav.is-scrolled .site-nav__links .nav-contact {
      color: var(--color-green);
      text-shadow: none;
    }

    .site-nav__inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .site-nav__logo {
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    .site-nav__logo img {
      height: 48px;
      width: auto;
      /* multiply: baked-in white background disappears on light surface */
      mix-blend-mode: multiply;
      background: transparent;
    }

    /* Scrolled: dark nav — switch to invert so logo reads white */
    .site-nav.is-scrolled .site-nav__logo img {
      mix-blend-mode: normal;
      filter: brightness(0) invert(1);
    }

    .site-nav__links {
      display: flex;
      align-items: center;
      gap: var(--space-lg);
    }

    @media (max-width: 767px) {
      .site-nav__links { display: none; }
    }

    /* ── Hero ─────────────────────────────────────────────────── */

    .hero {
      position: relative;
      height: 65svh;
      min-height: 380px;
      background-color: var(--color-near-black);
      margin-inline: var(--grid-gutter);
      margin-top: 100px;
      overflow: hidden;
    }

    /* Full-bleed background photo layer */
    .hero__bg {
      position: absolute;
      inset: 0;
      background-image: url('assets/images/attractions/ferrari-world.png');
      background-size: cover;
      background-position: center 30%;
      z-index: 0;
    }

    /* Gradient overlay — bottom-heavy for legible reversed type */
    .hero__bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(17, 18, 18, 0.1)  0%,
        rgba(17, 18, 18, 0.55) 50%,
        rgba(17, 18, 18, 0.88) 100%
      );
    }

    /* Midground architectural rule — Layer 1 */
    .hero__midground-rule {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background-color: rgba(255, 255, 255, 0.05);
      pointer-events: none;
      z-index: 2;
    }

    /* Content: absolute bottom-left — non-negotiable */
    .hero__content {
      position: absolute;
      bottom: var(--space-lg);
      left: var(--grid-gutter);
      right: var(--grid-gutter);
      z-index: 3;
    }

    /* ── Footer ───────────────────────────────────────────────── */

    .site-footer {
      background-color: transparent;
      border-top: none;
      padding-block: var(--space-md);
      margin-inline: 0;
    }

    .site-footer__inner {
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
      align-items: flex-start;
    }

    @media (min-width: 768px) {
      .site-footer__inner {
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        gap: var(--space-lg);
      }
    }

    .site-footer__logo img {
      height: 36px;
      width: auto;
      mix-blend-mode: multiply;
    }


    /* ================================================================
       COMPONENTS.CSS — DISCRETE UI COMPONENTS
    ================================================================ */

    /* ── Navigation components ────────────────────────────────── */

    .site-nav__links a {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(17, 18, 18, 0.7);
      text-shadow: none;
      transition: color var(--dur-fast) var(--ease-in-out);
    }

    .site-nav__links a:hover { color: var(--color-near-black); }

    .site-nav__links a[aria-current="page"] { color: var(--color-green); }

    .site-nav__links .nav-contact {
      color: var(--color-green);
      border: 1px solid var(--color-green);
      padding: 0.45em calc(1em - 0.12em) 0.4em 1em;
      text-shadow: none;
      transition:
        color            var(--dur-fast) var(--ease-in-out),
        background-color var(--dur-fast) var(--ease-in-out);
    }

    .site-nav__links .nav-contact:hover {
      color: var(--color-near-black);
      background-color: var(--color-green);
    }

    .site-nav__links a:focus-visible {
      outline: 2px solid var(--color-green);
      outline-offset: 3px;
    }

    /* ── Hero components ──────────────────────────────────────── */

    .hero__rule {
      display: block;
      width: 48px;
      height: 1px;
      background-color: var(--color-green);
      margin-bottom: var(--space-md);
    }

    .hero__tagline {
      font-size: var(--type-body);
      font-weight: 400;
      color: rgba(255, 255, 255, 0.85);
      text-shadow: 0 1px 8px rgba(0, 0, 0, 0.6);
      margin-bottom: var(--space-md);
      max-width: 40ch;
    }

    .hero__headline {
      font-size: var(--type-display);
      font-weight: 800;
      line-height: 0.95;
      letter-spacing: -0.03em;
      text-transform: uppercase;
      color: var(--color-white);
    }

    .hero__headline-accent {
      color: var(--color-green);
    }

    /* ── Footer components ────────────────────────────────────── */

    .site-footer__copy {
      font-size: var(--type-caption);
      font-weight: 400;
      letter-spacing: 0.04em;
      color: rgba(17, 18, 18, 0.4);
    }


    /* ================================================================
       CONTACT PAGE — SCOPED STYLES
       All classes prefixed .contact- to avoid collisions.
    ================================================================ */

    /* ── Contact form section ─────────────────────────────────── */

    .contact-section {
      position: relative;
      background-color: var(--color-off-white);
      padding-top: var(--space-xl);
      padding-bottom: var(--space-xl);
      /* padding-inline handled entirely by .container child */
      z-index: 2;
    }

    /* Container override — explicit centering for contact section.
       Redundant with global .container but stated here for clarity. */
    .contact-section > .container {
      max-width: var(--grid-max);
      margin-inline: auto;
      padding-inline: var(--grid-gutter);
    }

    /* Two-column grid: fixed intro column left, form right */
    .contact-section__grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-xl) 0;
      align-items: start;
    }

    @media (min-width: 900px) {
      .contact-section__grid {
        grid-template-columns: 280px 1fr;
        gap: 0 var(--space-xl);
      }
    }

    /* ── Left column — intro ──────────────────────────────────── */

    .contact-intro__body {
      font-size: clamp(1.1rem, 1.8vw, 1.4rem);
      font-weight: 600;
      line-height: 1.5;
      color: var(--color-near-black);
    }

    /* ── Right column — form ──────────────────────────────────── */

    .contact-form__label {
      display: block;
      font-size: var(--type-label);
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--color-slate);
      margin-bottom: 0.5em;
    }

    .contact-form__input,
    .contact-form__textarea {
      display: block;
      width: 100%;
      background-color: rgba(17, 18, 18, 0.04);
      border: none;
      border-bottom: 2px solid rgba(17, 18, 18, 0.15);
      padding: 0.75em 1em;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: var(--type-body);
      font-weight: 400;
      color: var(--color-near-black);
      outline: none;
      transition:
        border-color     var(--dur-fast) var(--ease-in-out),
        background-color var(--dur-fast) var(--ease-in-out);
      margin-bottom: var(--space-lg);
      /* Ensure no browser autofill background bleed */
      -webkit-appearance: none;
      appearance: none;
    }

    /* Autofill: preserve our tinted background */
    .contact-form__input:-webkit-autofill,
    .contact-form__input:-webkit-autofill:hover,
    .contact-form__input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0 1000px rgba(17, 18, 18, 0.04) inset;
      -webkit-text-fill-color: var(--color-near-black);
    }

    .contact-form__input:focus,
    .contact-form__textarea:focus {
      background-color: rgba(91, 175, 122, 0.06);
      border-bottom-color: var(--color-green);
    }

    .contact-form__textarea {
      resize: vertical;
      min-height: 120px;
    }

    .contact-form__input.is-error,
    .contact-form__textarea.is-error {
      border-bottom-color: #e05252;
    }

    .contact-form__submit {
      display: inline-flex;
      align-items: center;
      gap: var(--space-sm);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: var(--type-label);
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--color-near-black);
      background-color: var(--color-green);
      border: 1px solid var(--color-green);
      padding: 1em calc(2em - 0.14em) 1em 2em;
      cursor: pointer;
      transition:
        background-color var(--dur-fast) var(--ease-in-out),
        border-color     var(--dur-fast) var(--ease-in-out);
    }

    .contact-form__submit:hover {
      background-color: var(--color-green-dark);
      border-color: var(--color-green-dark);
    }

    .contact-form__submit:focus-visible {
      outline: 2px solid var(--color-green);
      outline-offset: 3px;
    }

    /* Submit arrow — matches CTA close arrow motion */
    .contact-form__submit-arrow {
      display: inline-block;
      transition: transform var(--dur-fast) var(--ease-out-expo);
    }

    .contact-form__submit:hover .contact-form__submit-arrow {
      transform: translateX(5px);
    }

    /* Success state — replaces form on successful send */
    .contact-form__success {
      display: none;
      padding: var(--space-md) 0;
    }

    .contact-form__success.is-visible {
      display: block;
    }

    .contact-form__success-headline {
      font-size: var(--type-heading);
      font-weight: 800;
      line-height: 1.0;
      letter-spacing: -0.02em;
      text-transform: uppercase;
      color: var(--color-near-black);
      margin-bottom: var(--space-sm);
    }

    .contact-form__success-body {
      font-size: var(--type-body);
      color: var(--color-body-text);
    }

    /* Bottom breathing room below the form — page ends here */
    .contact-section + .site-footer {
      padding-top: 0;
    }

  </style>
</head>

<body>

  <!-- ============================================================
       NAVIGATION
       Transparent default — dark links on off-white surface.
       Solid dark + white links on scroll past 80px.
       Contact is active page — aria-current="page".
  ============================================================ -->
  <nav class="site-nav" aria-label="Primary navigation">
    <div class="container">
      <div class="site-nav__inner">

        <a href="index.html" class="site-nav__logo" aria-label="Grant Leisure — Home">
          <img
            src="assets/images/gli-logo.svg"
            alt="Grant Leisure"
            width="120"
            height="40"
          />
        </a>

        <ul class="site-nav__links" role="list">
          <li><a href="about.html">About</a></li>
          <li><a href="team.html">Team</a></li>
          <li><a href="services.html">Services</a></li>
          <li><a href="projects.html">Projects</a></li>
          <li>
            <a
              href="contact.html"
              class="nav-contact"
              aria-current="page"
            >
              Contact
            </a>
          </li>
        </ul>

      </div>
    </div>
  </nav>


  <main id="main-content">

    <!-- ============================================================
         SECTION 01 — HERO CARD
         Contained dark card on the off-white page surface.
         Background image: ferrari-world.png.
         Content pinned bottom-left. Display headline.
    ============================================================ -->
    <section class="hero" aria-labelledby="hero-headline">

      <!-- Layer 0: background photo + gradient overlay via ::after -->
      <div class="hero__bg" role="presentation" aria-hidden="true"></div>

      <!-- Layer 1: architectural midground rule -->
      <div class="hero__midground-rule" aria-hidden="true"></div>

      <!-- Layer 2: content -->
      <div class="hero__content reveal-group">

        <!-- 48px green rule -->
        <span class="hero__rule" aria-hidden="true"></span>

        <!-- Display headline — two lines, line 2 in green -->
        <h1 class="hero__headline" id="hero-headline">
          Let's Build<br />
          <span class="hero__headline-accent">Something Lasting.</span>
        </h1>

      </div>

    </section>


    <!-- ============================================================
         SECTION 02 — CONTACT FORM
         Off-white surface. Two-column at desktop: intro left, form right.
         Form is the CTA — no separate CTA close section.
    ============================================================ -->
    <section class="contact-section" aria-labelledby="contact-heading">
      <div class="container">

        <div class="contact-section__grid">

          <!-- Left column — intro ─────────────────────────────── -->
          <div class="contact-intro reveal">
            <p class="contact-intro__body">
              Every great project starts with a conversation.<br><br>
              Tell us what you're working on.
            </p>
          </div>

          <!-- Right column — form ─────────────────────────────── -->
          <div class="contact-form-wrap reveal">

            <form
              class="contact-form"
              id="contact-form"
              action="#"
              method="post"
              novalidate
              aria-label="Contact form"
            >

              <!-- Name -->
              <div class="contact-form__field">
                <label class="contact-form__label" for="field-name">
                  Name
                </label>
                <input
                  class="contact-form__input"
                  type="text"
                  id="field-name"
                  name="name"
                  autocomplete="name"
                  aria-required="true"
                />
              </div>

              <!-- Company -->
              <div class="contact-form__field">
                <label class="contact-form__label" for="field-company">
                  Company
                </label>
                <input
                  class="contact-form__input"
                  type="text"
                  id="field-company"
                  name="company"
                  autocomplete="organization"
                />
              </div>

              <!-- Email -->
              <div class="contact-form__field">
                <label class="contact-form__label" for="field-email">
                  Email
                </label>
                <input
                  class="contact-form__input"
                  type="email"
                  id="field-email"
                  name="email"
                  autocomplete="email"
                  aria-required="true"
                />
              </div>

              <!-- Message -->
              <div class="contact-form__field">
                <label class="contact-form__label" for="field-message">
                  Message
                </label>
                <textarea
                  class="contact-form__textarea"
                  id="field-message"
                  name="message"
                  rows="6"
                  aria-required="true"
                ></textarea>
              </div>

              <button
                type="submit"
                class="contact-form__submit"
                aria-label="Send your message to Grant Leisure"
              >
                Send Message
                <span class="contact-form__submit-arrow" aria-hidden="true">&#8594;</span>
              </button>

            </form>

            <!-- Success state — shown by JS after valid submit -->
            <div
              class="contact-form__success"
              id="contact-success"
              role="alert"
              aria-live="polite"
            >
              <p class="contact-form__success-headline">Message Sent.</p>
              <p class="contact-form__success-body">
                Thank you for reaching out. We'll be in touch shortly.
              </p>
            </div>

          </div><!-- /.contact-form-wrap -->

        </div><!-- /.contact-section__grid -->

      </div><!-- /.container -->
    </section>

  </main>


  <!-- ============================================================
       FOOTER
       Transparent background on off-white canvas.
       Logo left · Copyright right. Year injected by JS.
       No CTA close — the form is the CTA.
  ============================================================ -->
  <footer class="site-footer" aria-label="Site footer">
    <div class="container">
      <div class="site-footer__inner">

        <div class="site-footer__logo">
          <img
            src="assets/images/gli-logo.svg"
            alt="Grant Leisure"
            width="80"
            height="27"
            loading="lazy"
          />
        </div>

        <p class="site-footer__copy">
          &copy; <span id="footer-year"></span> Grant Leisure. All rights reserved.
        </p>

      </div>
    </div>
  </footer>


  <!-- JS — deferred, non-blocking. No inline handlers. const/let only. -->
  <script defer>
    (() => {
      'use strict';

      // ── Footer year ──────────────────────────────────────────────
      const yearEl = document.getElementById('footer-year');
      if (yearEl) yearEl.textContent = new Date().getFullYear();

      // ── Nav scroll state ─────────────────────────────────────────
      // 80px clears fixed nav height — prevents flicker at very top
      const nav = document.querySelector('.site-nav');
      if (nav) {
        const onScroll = () => {
          const scrolled = window.scrollY > 80;
          nav.classList.toggle('is-scrolled', scrolled);
        };
        window.addEventListener('scroll', onScroll, { passive: true });
        onScroll();
      }

      // ── Scroll-reveal via IntersectionObserver ───────────────────
      // One-shot. Graceful fallback if IO unavailable.
      const revealTargets = document.querySelectorAll('.reveal, .reveal-group');

      if ('IntersectionObserver' in window && revealTargets.length) {
        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (!entry.isIntersecting) return;
              entry.target.classList.add('is-visible');
              observer.unobserve(entry.target);
            });
          },
          { threshold: 0.1, rootMargin: '0px 0px -40px 0px' }
        );
        revealTargets.forEach((el) => observer.observe(el));
      } else {
        // Graceful fallback — reveal everything immediately
        revealTargets.forEach((el) => el.classList.add('is-visible'));
      }

      // ── Form validation ──────────────────────────────────────────
      // Required fields: name, email, message.
      // Company is optional.
      // On invalid field: add .is-error. Remove .is-error on focus.
      const form = document.getElementById('contact-form');
      const successEl = document.getElementById('contact-success');

      if (form) {
        // Remove error state as soon as the user engages with a field
        const fields = form.querySelectorAll('.contact-form__input, .contact-form__textarea');
        fields.forEach((field) => {
          field.addEventListener('focus', () => {
            field.classList.remove('is-error');
          });
        });

        form.addEventListener('submit', (e) => {
          e.preventDefault();

          const nameField    = form.querySelector('[name="name"]');
          const emailField   = form.querySelector('[name="email"]');
          const messageField = form.querySelector('[name="message"]');

          let isValid = true;

          // Validate name
          if (!nameField.value.trim()) {
            nameField.classList.add('is-error');
            isValid = false;
          }

          // Validate email — must be non-empty and contain @
          const emailVal = emailField.value.trim();
          if (!emailVal || !emailVal.includes('@')) {
            emailField.classList.add('is-error');
            isValid = false;
          }

          // Validate message
          if (!messageField.value.trim()) {
            messageField.classList.add('is-error');
            isValid = false;
          }

          if (!isValid) return;

          // ── Valid: hide form, show success state ─────────────
          // TODO: replace with Formspree fetch() call before deployment.
          // form.action will be set to the Formspree endpoint.
          form.style.display = 'none';
          if (successEl) {
            successEl.classList.add('is-visible');
            // Move focus to success message for screen reader announcement
            successEl.setAttribute('tabindex', '-1');
            successEl.focus();
          }
        });
      }

    })();
  </script>

</body>
</html>
