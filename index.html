<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Grant Leisure — Global Registry of Strategic Advisory and Technical Compliance.">
  <title>Grant Leisure — Primary Global Registry</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800&display=swap" rel="stylesheet" />

  <style>
    /* ================================================================
       MASTER TOKENS & TYPOGRAPHY
    ================================================================ */
    @font-face {
      font-family: 'Playfair Display';
      font-style: normal;
      font-weight: 900;
      src: url('assets/fonts/PlayfairDisplay-Black.ttf') format('truetype');
    }

    :root {
      --color-green:         #5BAF7A;
      --color-near-black:    #0A0A0A;
      --color-white:         #FFFFFF;
      --color-off-white:     #F9F9F9;
      --color-slate:         #7A7F9A;
      
      --type-display:        clamp(3.5rem, 8vw, 6.5rem);
      --type-heading:        clamp(2.2rem, 5vw, 4rem);
      --type-body:           clamp(1rem, 1.2vw, 1.1rem);

      --space-md:            2rem;
      --space-lg:            4rem;
      --space-xl:            7rem;
      --grid-gutter:         clamp(1.5rem, 5vw, 5rem);
      --ease-out-expo:       cubic-bezier(0.16, 1, 0.3, 1);
      --dur-fast:            350ms;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: var(--type-body);
      color: #2E2F2F;
      background-color: var(--color-white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    .spine-align {
      padding-left: calc(var(--grid-gutter) * 2);
      max-width: 1440px;
      margin-inline: auto;
    }

    /* ================================================================
       1. ZERO-HERO PROTOCOL
    ================================================================ */
    .hero-registry {
      min-height: 65svh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding-bottom: var(--space-xl);
      padding-top: 140px;
    }

    .hero-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--color-slate);
      margin-bottom: var(--space-md);
      display: block;
    }

    .hero-statement {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: var(--type-display);
      line-height: 0.95;
      color: var(--color-near-black);
      max-width: 12ch;
    }

    /* ================================================================
       2. THE HOOK — CHAMELEON TRIGGER
    ================================================================ */
    .hook-section {
      background: var(--color-near-black);
      padding-block: var(--space-xl);
      color: var(--color-white);
    }

    .hook-kicker {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 800;
      color: var(--color-green);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 1rem;
      display: block;
    }

    .hook-h2 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: var(--type-heading);
      font-weight: 800;
      text-transform: uppercase;
      line-height: 0.9;
      max-width: 20ch;
    }

    /* ================================================================
       3. SECTOR REGISTRY — BENTO
    ================================================================ */
    .sector-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      border-top: 0.5px solid rgba(17,18,18,0.1);
      background: var(--color-white);
    }

    @media (max-width: 1024px) { .sector-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 600px) { .sector-grid { grid-template-columns: 1fr; } }

    .sector-cell {
      padding: var(--space-lg) var(--space-md);
      border: 0.5px solid rgba(17,18,18,0.1);
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      transition: all var(--dur-fast) var(--ease-out-expo);
    }

    .sector-cell:hover { border-color: var(--color-green); background: var(--color-off-white); }

    .sector-icon {
      width: 24px;
      height: 24px;
      border: 0.5px solid var(--color-green);
      background: #EEEEEC;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sector-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* ================================================================
       4. MAP EXHIBIT — FIG_05
    ================================================================ */
    .map-exhibit { padding-block: var(--space-xl); background: var(--color-off-white); }

    .exhibit-frame {
      border: 0.5px solid var(--color-green);
      aspect-ratio: 21 / 9;
      background: var(--color-near-black);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .exhibit-placeholder {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: var(--color-green);
      letter-spacing: 0.2em;
    }

    .exhibit-caption {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--color-slate);
      margin-top: 1rem;
      display: block;
    }

    /* REVEAL LOGIC */
    .reveal { opacity: 0; transform: translateY(20px); transition: all 0.8s var(--ease-out-expo); }
    .reveal.is-visible { opacity: 1; transform: translateY(0); }

  </style>
</head>
<body>

  <nav id="nav-master" class="site-nav" style="position:fixed; width:100%; z-index:1000; height:80px;"></nav>

  <main>
    <header class="hero-registry">
      <div class="spine-align">
        <span class="hero-label reveal">[ GLOBAL_REGISTRY_ALPHA ]</span>
        <h1 class="hero-statement reveal">Profit from our experience.</h1>
      </div>
    </header>

    <section class="hook-section hook-trigger">
      <div class="spine-align">
        <span class="hook-kicker reveal">Critical Intelligence</span>
        <h2 class="hook-h2 reveal">90% of new visitor attractions fail within the first five years.</h2>
      </div>
    </section>

    <section class="sector-registry">
      <div class="sector-grid">
        <article class="sector-cell reveal">
          <div class="sector-icon"><img src="assets/images/icons/themed-ent.svg" alt="" width="16" height="16"></div>
          <h3 class="sector-label">Themed Entertainment</h3>
        </article>
        <article class="sector-cell reveal">
          <div class="sector-icon"><img src="assets/images/icons/heritage.svg" alt="" width="16" height="16"></div>
          <h3 class="sector-label">Cultural Heritage</h3>
        </article>
        <article class="sector-cell reveal">
          <div class="sector-icon"><img src="assets/images/icons/urban.svg" alt="" width="16" height="16"></div>
          <h3 class="sector-label">Urban Regeneration</h3>
        </article>
        <article class="sector-cell reveal">
          <div class="sector-icon"><img src="assets/images/icons/resort.svg" alt="" width="16" height="16"></div>
          <h3 class="sector-label">Resort Development</h3>
        </article>
        <article class="sector-cell reveal">
          <div class="sector-icon"><img src="assets/images/icons/wildlife.svg" alt="" width="16" height="16"></div>
          <h3 class="sector-label">Wildlife & Conservation</h3>
        </article>
      </div>
    </section>

    <section class="map-exhibit">
      <div class="spine-align">
        <figure class="reveal">
          <div class="exhibit-frame">
            <span class="exhibit-placeholder">ASSET: INTELLIGENCE_PLOT_MAP</span>
          </div>
          <figcaption class="exhibit-caption">FIG_05 // MARKET PENETRATION // 2,500+ PROJECTS COMPLETED // 35 COUNTRIES</figcaption>
        </figure>
      </div>
    </section>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('is-visible'); });
      }, { threshold: 0.1 });
      document.querySelectorAll('.reveal').forEach(r => observer.observe(r));
    });
  </script>
</body>
</html>
