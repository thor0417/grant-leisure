<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Grant Leisure — Primary Global Registry. Strategic advisory and technical compliance for world-class attractions." />
  <title>Grant Leisure — Primary Global Registry</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800&display=swap" rel="stylesheet" />

  <style>
    /* ================================================================
       1. FORCE CSS VARIABLE SYNC
    ================================================================ */
    @font-face {
      font-family: 'Playfair Display';
      font-style: normal;
      font-weight: 900;
      font-display: swap;
      src: url('assets/fonts/PlayfairDisplay-Black.ttf') format('truetype');
    }
    @font-face {
      font-family: 'Playfair Display';
      font-style: italic;
      font-weight: 400;
      font-display: swap;
      src: url('assets/fonts/PlayfairDisplay-Italic.ttf') format('truetype');
    }

    :root {
      --color-green:         #5BAF7A;
      --color-near-black:    #111212;
      --color-white:         #FFFFFF;
      --color-off-white:     #F9F9F9;
      --color-slate:         #7A7F9A;
      --color-body-text:     #2E2F2F;

      --type-display:        clamp(3.5rem, 8vw, 6.5rem);
      --type-heading:        clamp(2.2rem, 5vw, 4rem);
      --type-body:           clamp(1rem, 1.2vw, 1.1rem);

      --space-xl:            7rem;
      --space-2xl:           12rem;
      --space-v-rhythm:      15vh; 
      --grid-gutter:         clamp(1.5rem, 5vw, 5rem);
      
      --ease-out-expo:       cubic-bezier(0.16, 1, 0.3, 1);
      --dur-fast:            350ms;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: var(--type-body);
      color: var(--color-body-text);
      background-color: var(--color-white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ================================================================
       2. FIXED SPINE
    ================================================================ */
    .spine-container {
      padding-left: calc(var(--grid-gutter) * 2);
      max-width: 1440px;
      margin-inline: auto;
    }

    /* ================================================================
       NAVIGATION
    ================================================================ */
    .site-nav {
      position: fixed;
      inset-block-start: 0;
      inset-inline: 0;
      z-index: 9999;
      padding-block: 1rem;
      background: transparent;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .site-nav__inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-inline: var(--grid-gutter);
    }

    .site-nav__logo img { height: 48px; width: auto; mix-blend-mode: multiply; }
    .site-nav__links { display: flex; align-items: center; gap: 4rem; list-style: none; }
    .site-nav__links a {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(17, 18, 18, 0.7);
      text-decoration: none;
    }

    .nav-over-dark .site-nav__links a { color: rgba(255, 255, 255, 0.9); }
    .nav-over-dark .site-nav__logo img { filter: brightness(0) invert(1); mix-blend-mode: normal; }

    /* ================================================================
       SECTIONS
    ================================================================ */
    .hero-registry {
      min-height: 85svh;
      padding-top: 180px;
      padding-bottom: var(--space-v-rhythm);
    }

    .hero-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--color-slate);
      margin-bottom: 2rem;
      display: block;
    }

    .hero-statement {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: var(--type-display);
      line-height: 0.95;
      color: var(--color-near-black);
      margin-bottom: 4rem;
    }

    .exhibit-frame {
      border: 0.5px solid var(--color-green);
      aspect-ratio: 21 / 9;
      overflow: hidden;
    }

    .exhibit-frame img { width: 100%; height: 100%; object-fit: cover; }

    /* ================================================================
       3. RE-ARCHITECTED LOGO GRID
    ================================================================ */
    .logo-registry {
      padding-block: var(--space-v-rhythm);
      background-color: var(--color-white);
    }

    .logo-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      border-top: 0.5px solid #E0E0E0;
      border-left: 0.5px solid #E0E0E0;
    }

    .logo-cell {
      aspect-ratio: 3 / 2;
      display: flex;
      align-items: center;
      justify-content: center;
      border-right: 0.5px solid #E0E0E0;
      border-bottom: 0.5px solid #E0E0E0;
      padding: 2rem;
      transition: border-color var(--dur-fast);
    }

    .logo-cell img {
      max-height: 60px;
      width: auto;
      object-fit: contain;
      filter: grayscale(1) opacity(0.5);
      transition: all var(--dur-fast) var(--ease-out-expo);
    }

    .logo-cell:hover { border: 1px solid var(--color-green); z-index: 10; }
    .logo-cell:hover img { filter: grayscale(0) opacity(1); }

    /* ================================================================
       4. BLACK-OUT SECTION
    ================================================================ */
    .failure-hook {
      background-color: var(--color-near-black);
      padding-block: var(--space-v-rhythm);
      color: var(--color-white);
      width: 100vw;
      position: relative;
      left: 50%;
      right: 50%;
      margin-left: -50vw;
      margin-right: -50vw;
    }

    .failure-text {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: var(--type-heading);
      font-weight: 800;
      text-transform: uppercase;
      line-height: 0.9;
      max-width: 800px;
    }

    .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s var(--ease-out-expo); }
    .reveal.is-visible { opacity: 1; transform: translateY(0); }

    /* ================================================================
       FINAL AUTHORITY OVERRIDE — DO NOT REMOVE
    ================================================================ */
    .hero-statement { 
      font-family: 'Playfair Display', serif !important; 
      font-weight: 900 !important; 
      letter-spacing: -0.03em !important;
      line-height: 0.9 !important;
      padding-left: 0 !important;
    }

    .spine-container { 
      padding-left: 15% !important; /* FORCES THE FURRION SPINE */
      max-width: none !important; 
      margin: 0 !important;
    }

    .logo-grid {
      display: grid !important;
      grid-template-columns: repeat(5, 1fr) !important;
      gap: 0 !important;
      border: 0.5px solid rgba(0,0,0,0.1) !important;
    }

    .logo-cell img {
      max-height: 60px !important;
      width: auto !important;
      object-fit: contain !important;
      filter: grayscale(1) opacity(0.6) !important;
    }

    .logo-cell:hover img {
      filter: grayscale(0) opacity(1) !important;
    }
  </style>
</head>

<body>
  <nav class="site-nav">
    <div class="site-nav__inner">
      <a href="index.html" class="site-nav__logo"><img src="assets/images/gli-logo.svg" alt="Grant Leisure" width="120" height="40"></a>
      <ul class="site-nav__links">
        <li><a href="about.html">About</a></li>
        <li><a href="team.html">Team</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="contact.html" style="color:var(--color-green); border:1px solid var(--color-green); padding:0.5em 1.2em;">Contact</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <header class="hero-registry">
      <div class="spine-container">
        <span class="hero-label reveal">[ GLOBAL_REGISTRY_ALPHA ]</span>
        <h1 class="hero-statement reveal">Profit from our experience<span style="color:var(--color-green);">.</span></h1>
        <div class="exhibit-frame reveal">
          <img src="assets/images/attractions/london-eye.png" alt="London Eye Strategic Audit" width="1600" height="685">
        </div>
      </div>
    </header>

    <section id="dark-trigger" class="failure-hook">
      <div class="spine-container">
        <span style="font-family:'Barlow Condensed'; font-size:11px; font-weight:800; color:var(--color-green); letter-spacing:0.15em; text-transform:uppercase; margin-bottom:1.5rem; display:block;" class="reveal">Critical Intelligence</span>
        <h2 class="failure-text reveal">90% of new visitor attractions fail within the first five years.</h2>
      </div>
    </section>

    <section class="logo-registry">
      <div class="spine-container">
        <span class="hero-label reveal" style="margin-bottom:2.5rem;">[ STRATEGIC_ALLIANCES // TIER_1_DESTINATIONS ]</span>
        <div class="logo-grid reveal">
          <div class="logo-cell"><img src="assets/images/logos/disney.png" alt="Disney"></div>
          <div class="logo-cell"><img src="assets/images/logos/nbc-universal.png" alt="NBC Universal"></div>
          <div class="logo-cell"><img src="assets/images/logos/paramount.png" alt="Paramount"></div>
          <div class="logo-cell"><img src="assets/images/logos/lego-land.png" alt="Lego"></div>
          <div class="logo-cell"><img src="assets/images/logos/ferrari-world.png" alt="Ferrari"></div>
          <div class="logo-cell"><img src="assets/images/logos/zsl.png" alt="ZSL"></div>
          <div class="logo-cell"><img src="assets/images/logos/english-heritage.png" alt="English Heritage"></div>
          <div class="logo-cell"><img src="assets/images/logos/sd-zoo.png" alt="San Diego Zoo"></div>
          <div class="logo-cell"><img src="assets/images/logos/v&a.png" alt="V&A"></div>
          <div class="logo-cell"><img src="assets/images/logos/harrahs.png" alt="Harrah's"></div>
          <div class="logo-cell"><img src="assets/images/logos/anheuser-busch.png" alt="Anheuser-Busch"></div>
          <div class="logo-cell"><img src="assets/images/logos/ocean-park.png" alt="Ocean Park"></div>
          <div class="logo-cell"><img src="assets/images/logos/blue-water.png" alt="Blue Water"></div>
          <div class="logo-cell"><img src="assets/images/logos/pr.png" alt="Parques Reunidos"></div>
          <div class="logo-cell"><img src="assets/images/logos/universal.png" alt="Universal"></div>
        </div>
      </div>
    </section>
  </main>

  <footer style="background:var(--color-off-white); padding-block:4rem; border-top:0.5px solid #E0E0E0;">
    <div class="spine-container" style="display:flex; justify-content:space-between; align-items:center; padding-left:var(--grid-gutter);">
      <img src="assets/images/gli-logo.svg" alt="Grant Leisure" width="80" height="27" style="mix-blend-mode:multiply;">
      <p style="font-family:'Barlow Condensed'; font-size:12px; color:rgba(17,18,18,0.4);">&copy; 2026 Grant Leisure. All rights reserved.</p>
    </div>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('is-visible'); });
      }, { threshold: 0.1 });
      document.querySelectorAll('.reveal').forEach(r => observer.observe(r));

      const nav = document.querySelector('.site-nav');
      const darkTrigger = document.getElementById('dark-trigger');
      const navObserver = new IntersectionObserver((entries) => {
        entries.forEach(e => { nav.classList.toggle('nav-over-dark', e.isIntersecting); });
      }, { threshold: 0, rootMargin: "-80px 0px 0px 0px" });
      if(darkTrigger) navObserver.observe(darkTrigger);
    });
  </script>
</body>
</html>
